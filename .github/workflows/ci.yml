# The name of the workflow as it appears on GitHub
name: Node.js CI

# 1. Define the trigger (Event)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Define what to do (Jobs)
jobs:
  build-and-test:
    # Operating system for the runner
    runs-on: ubuntu-latest

    # 3. Steps to execute sequentially
    steps:
    # Step 1: Clone the repository onto the runner
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up the specific Node.js version
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'
        cache: 'npm' # Caches dependencies for faster subsequent runs

    # Step 3: Install dependencies
    - name: Install dependencies
      run: npm ci