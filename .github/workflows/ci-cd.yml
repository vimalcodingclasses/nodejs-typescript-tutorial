name: Node.js TypeScript CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: CONTINUOUS INTEGRATION ---
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node version
          cache: 'npm'       # Automatically caches node_modules

      - name: Install Dependencies
        run: npm ci          # 'npm ci' is faster and cleaner for CI environments

      # Optional: Add a linting step if you use ESLint
      - name: Run Linter
        run: npm run lint --if-present

      - name: Compile TypeScript
        run: npm run build   # This should trigger 'tsc' to compile TS to JS

      - name: Run Tests
        run: npm test --if-present

  # --- JOB 2: CONTINUOUS DEPLOYMENT ---
  deploy:
    name: Deploy Application
    needs: build-and-test # Only runs if the 'build-and-test' job passes
    runs-on: ubuntu-latest
    # Only deploy if the event happened on the main branch (not a PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Example: Deploying via SSH to a Linux VPS (DigitalOcean, AWS EC2, etc.)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 'localhost:3000'
          script: |
            cd /var/www/my-typescript-app
            git pull origin main
            npm ci
            npm run build
            pm2 restart app-name # Restarts your Node process manager